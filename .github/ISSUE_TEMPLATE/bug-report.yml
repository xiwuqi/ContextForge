name: Bug report
description: Report a reproducible problem in ContextForge.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Keep this focused on one issue and include a minimal reproduction when possible.
  - type: input
    id: contextforge-version
    attributes:
      label: ContextForge version
      description: `contextforge --version` or the package version you installed.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: 20.19.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: dropdown
    id: source-type
    attributes:
      label: Task source used
      description: Which input path were you using when the problem happened?
      options:
        - Local markdown input (`--input`)
        - Live GitHub issue (`--github-issue`)
        - GitHub issue JSON (`--github-issue-json`)
        - No task source involved
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: export-target
    attributes:
      label: Export target involved
      options:
        - Not applicable
        - Codex
        - Claude Code
        - Cursor
        - Multiple targets
    validations:
      required: true
  - type: input
    id: command-run
    attributes:
      label: Command run
      description: Paste the exact command or command sequence that triggered the problem.
      placeholder: contextforge compile --input examples/issue-add-command.md
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: A task pack should be written under .contextforge/task-packs/...
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: Include the error output or the incorrect result you saw.
      placeholder: The command failed with...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: If possible, attach or paste a minimal task source, repo fixture shape, or sanitized issue JSON that reproduces the bug.
      placeholder: |
        1. Run ...
        2. Use this minimal task input ...
        3. Observe ...
    validations:
      required: false

